<!-- src/app/pages/registro/registro.component.html -->
<div class="registro-overlay" (click)="cerrarModal()">
  <div class="registro-modal" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="cerrarModal()">✕</button>
    <h2 class="registro-title">REGISTRARSE</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" [(ngModel)]="nombre" name="nombre" required />
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" [(ngModel)]="email" name="email" required />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" required />
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
      </div>

      <div class="error-mensaje" *ngIf="errorMensaje">
        {{ errorMensaje }}
      </div>

      <button type="submit" class="submit-btn">¡OnStage!</button>
    </form>
  </div>
</div>
