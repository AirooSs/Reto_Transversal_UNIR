<div class="form-container">
  <div class="form-header">
    <a routerLink="/admin/eventos/activos" class="back-link">← VOLVER A EVENTOS</a>
    <h1 class="form-titulo">{{ esEdicion ? 'EDITAR EVENTO' : 'NUEVO EVENTO' }}</h1>
  </div>

  <div class="form-card">
    <div class="form-grid">

      <div class="form-group">
        <label>Título *</label>
        <input type="text" [(ngModel)]="evento.titulo" name="titulo" placeholder="Nombre del evento">
      </div>

      <div class="form-group">
        <label>Artista *</label>
        <input type="text" [(ngModel)]="evento.artista" name="artista" placeholder="Nombre del artista">
      </div>

      <div class="form-group">
        <label>Localidad *</label>
        <input type="text" [(ngModel)]="evento.localidad" name="localidad" placeholder="Ciudad">
      </div>

      <div class="form-group">
        <label>Fecha *</label>
        <input type="datetime-local" [(ngModel)]="evento.fecha" name="fecha">
      </div>

      <div class="form-group">
        <label>Duración (minutos)</label>
        <input type="number" [(ngModel)]="evento.duracion" name="duracion" min="0">
      </div>

      <div class="form-group">
        <label>Precio (€)</label>
        <input type="number" [(ngModel)]="evento.precio" name="precio" min="0" step="0.01">
      </div>

      <div class="form-group">
        <label>Aforo máximo</label>
        <input type="number" [(ngModel)]="evento.aforoMaximo" name="aforoMaximo" 
               min="0" (change)="onAforoChange()">
      </div>

      <div class="form-group">
        <label>Plazas disponibles</label>
        <input type="number" [(ngModel)]="evento.plazasDisponibles" name="plazasDisponibles" min="0">
      </div>

      <div class="form-group">
        <label>Tipo de Evento *</label>
        <select [(ngModel)]="tipoEventoId" name="tipoEvento" (change)="onTipoChange()">
          <option [value]="null">Selecciona un tipo</option>
          @for (tipo of tiposEvento; track tipo.id) {
            <option [value]="tipo.id">{{ tipo.nombre }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>URL Imagen</label>
        <input type="text" [(ngModel)]="evento.imagenUrl" name="imagenUrl" 
               placeholder="/img/evento.jpg">
      </div>

      <div class="form-group form-group-full">
        <label>Descripción</label>
        <textarea [(ngModel)]="evento.descripcion" name="descripcion" 
                  rows="4" placeholder="Descripción del evento"></textarea>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="evento.destacado" name="destacado">
          Evento destacado
        </label>
      </div>

    </div>

    <div class="error-mensaje" *ngIf="error">{{ error }}</div>

    <div class="form-acciones">
      <button class="btn-cancelar" (click)="cancelar()">Cancelar</button>
      <button class="btn-guardar" (click)="guardar()" [disabled]="loading">
        {{ loading ? 'Guardando...' : (esEdicion ? 'Guardar cambios' : 'Crear evento') }}
      </button>
    </div>
  </div>
</div>
